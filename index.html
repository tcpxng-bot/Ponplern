<script>

/* เก็บข้อมูลลงเครื่องด้วย localStorage (API หน้าตาเหมือน window.storage เดิม) */
window.storage = {
  async get(k){ try{ const v = localStorage.getItem('ploen:'+k); return v===null?null:{key:k,value:v}; }catch(e){ return null; } },
  async set(k,v){ try{ localStorage.setItem('ploen:'+k, v); }catch(e){} return {key:k,value:v}; },
  async delete(k){ try{ localStorage.removeItem('ploen:'+k); }catch(e){} return {key:k,deleted:true}; },
  async list(){ return {keys:[]}; }
};

</script>
